name: Documentation improvement
description: Suggest a documentation change or addition
title: "docs: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve the documentation.
  - type: dropdown
    id: area
    attributes:
      label: Which area?
      options:
        - README
        - Rule docs
        - CONTRIBUTING
        - Adding a rule guide
        - Other
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What should be changed or added?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why is this change needed?
