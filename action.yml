name: gh-actions-doctor
description: Scan GitHub Actions workflows for security, reliability, and performance issues.

inputs:
  path:
    description: Workflow directory or file to scan.
    required: false
    default: .github/workflows
  format:
    description: Output format (text, json, github-annotations, sarif).
    required: false
    default: github-annotations
  fail-on:
    description: Severity threshold for non-zero exit code (error, warning, info, none).
    required: false
    default: warning
  config:
    description: Optional config file path.
    required: false
    default: ""
  dotnet-version:
    description: .NET SDK version.
    required: false
    default: 10.0.x
  output:
    description: Optional file path where scanner output should be written.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Run gh-actions-doctor
      shell: bash
      run: |
        set -euo pipefail

        args=(
          scan
          --path "${{ inputs.path }}"
          --format "${{ inputs.format }}"
          --fail-on "${{ inputs.fail-on }}"
        )

        if [ -n "${{ inputs.config }}" ]; then
          args+=(--config "${{ inputs.config }}")
        fi

        output_file="${RUNNER_TEMP}/gh-actions-doctor-output.txt"
        set +e
        dotnet run --project "${GITHUB_ACTION_PATH}/src/GhActionsDoctor.Cli" -- "${args[@]}" > "${output_file}"
        exit_code=$?
        set -e

        cat "${output_file}"

        if [ -n "${{ inputs.output }}" ]; then
          mkdir -p "$(dirname "${{ inputs.output }}")"
          cp "${output_file}" "${{ inputs.output }}"
        fi

        exit "${exit_code}"
